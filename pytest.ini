[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:randomly
markers =
    smoke: fast subset, skips analytics and report jobs
    slow: analytics/report jobs that wait for async completion
    scale: high-scale benchmark and load validation tests
